<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    :root {
      --primary: #3d6b47;
      --secondary: #8baa7f;
      --dot: #3d6b47;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #8baa7f;
        --secondary: #6b8f71;
        --dot: #8baa7f;
      }
    }
    .shape-primary { fill: var(--primary); transition: fill 0.3s ease; }
    .shape-secondary { fill: var(--secondary); transition: fill 0.3s ease; }
    .shape-dot { fill: var(--dot); transition: fill 0.3s ease; }
  </style>
  <!-- Stylized Geometric M -->
  <!-- Left column -->
  <rect x="6" y="6" width="4" height="16" rx="1.5" class="shape-primary" />
  <!-- Diagonal left -->
  <path d="M10 8 L16 16 L16 20 L10 12 Z" class="shape-secondary" />
  <!-- Diagonal right -->
  <path d="M22 8 L16 16 L16 20 L22 12 Z" class="shape-secondary" />
  <!-- Right column -->
  <rect x="22" y="6" width="4" height="16" rx="1.5" class="shape-primary" />
  <!-- Accent Dot -->
  <circle cx="29" cy="20" r="2.5" class="shape-dot" />
</svg>
